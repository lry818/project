<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>山河桥语 - 中国古代桥梁时空数据可视化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        overflow: hidden;
      }
      
      #app {
        height: 100vh;
        width: 100vw;
      }
    </style>
    <script>
      // 自动检测并修正资源路径
      (function() {
        // 获取当前脚本的路径
        var scripts = document.getElementsByTagName('script');
        var currentScript = scripts[scripts.length - 1];
        var scriptSrc = currentScript.src;
        
        // 提取基础路径
        var basePath = '';
        if (scriptSrc && scriptSrc.includes('/project/')) {
          basePath = '/project';
        } else if (window.location.pathname.includes('/project/')) {
          basePath = '/project';
        }
        
        // 动态加载正确的 CSS 和 JS
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = basePath + '/assets/index-5ae3e8da.css';
        document.head.appendChild(link);
        
        var script = document.createElement('script');
        script.type = 'module';
        script.crossOrigin = '';
        script.src = basePath + '/assets/index-49c0ef96.js';
        document.body.appendChild(script);
        
        // 如果有其他资源需要修正,可以在这里添加
        console.log('资源加载路径:', basePath);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
